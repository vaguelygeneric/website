title: "Vaguely Generic"
tagline: "An online presence about nothing specific."
description: "Vaguely Generic is a presence that exists to do whatever."
baseurl: ""
url: "https://vaguelygeneric.website"

# YouTube
youtube_channel: "https://www.youtube.com/@VaguelyGeneric"

# Shows — used for dynamic nav dropdown and RSS feeds
shows:
  - name: "The Generic"
    slug: generic
    description: "Freeform conversations about whatever comes up. No topic. No agenda. Just talking."
    subtitle: "Discussing Nothing Specific Since Whenever"
    author: "The Generic Hosts"
    email: "email@vaguelygeneric.website"
    language: "en-us"
    category: "Society & Culture"
    subcategory: "Personal Journals"
    explicit: "false"
    image: "/assets/images/podcast-cover.png"
    feed_url: "/feed/generic.xml"
  - name: "Ramblings"
    slug: ramblings
    description: "Longer, looser, less edited. Thoughts that needed more room."
    subtitle: "Unedited and Unashamed"
    author: "The Generic Hosts"
    email: "hello@vaguelygeneric.website"
    language: "en-us"
    category: "Society & Culture"
    subcategory: "Personal Journals"
    explicit: "false"
    image: "/assets/images/podcast-cover-ramblings.png"
    feed_url: "/feed/ramblings.xml"
  - name: "Readings"
    slug: readings
    description: "Audio readings of things worth reading aloud."
    subtitle: "Worth Hearing Aloud"
    author: "The Generic Hosts"
    email: "hello@vaguelygeneric.website"
    language: "en-us"
    category: "Arts"
    subcategory: "Literature"
    explicit: "false"
    image: "/assets/images/podcast-cover-readings.png"
    feed_url: "/feed/readings.xml"

# Collections
collections:
  podcast:
    output: true
    permalink: /podcast/:path/
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/
  guests:
    output: true
    permalink: /guests/:slug/

defaults:
  - scope:
      path: ""
      type: "podcast"
    values:
      layout: "episode"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "guests"
    values:
      layout: "guest"

# Build settings
markdown: kramdown
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

permalink: /:categories/:year/:month/:day/:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - README.md
  - Dockerfile
