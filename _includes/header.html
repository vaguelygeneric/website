<header class="site-header">
  <div class="header-inner">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      <span class="logo-bracket">[</span>
      <span class="logo-text">The Generic</span>
      <span class="logo-bracket">]</span>
    </a>

    <nav class="site-nav" id="site-nav" aria-label="Main navigation">
      <ul class="nav-list">
        <li><a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Home</a></li>
        <li class="nav-item--has-dropdown">
          <a href="{{ '/podcast/' | relative_url }}"
            class="nav-link nav-link--parent {% if page.url contains '/podcast' %}active{% endif %}">
            Podcasts
            <svg class="dropdown-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              aria-hidden="true">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </a>
          <ul class="nav-dropdown">
            <li><a href="{{ '/podcast/' | relative_url }}" class="nav-dropdown-link">All Shows</a></li>
            <li class="nav-dropdown-divider"></li>
            <li><a href="{{ '/podcast/generic/' | relative_url }}" class="nav-dropdown-link">The Generic</a></li>
            <li><a href="{{ '/podcast/ramblings/' | relative_url }}" class="nav-dropdown-link">Ramblings</a></li>
            <li><a href="{{ '/podcast/readings/' | relative_url }}" class="nav-dropdown-link">Readings</a></li>
          </ul>
        </li>
        <li><a href="{{ '/blog/' | relative_url }}"
            class="nav-link {% if page.url contains '/blog' %}active{% endif %}">Blog</a></li>
        <li><a href="{{ '/about/' | relative_url }}"
            class="nav-link {% if page.url contains '/about' %}active{% endif %}">About</a></li>
        <li>
          <a href="{{ site.youtube_channel }}" class="nav-link nav-link--youtube" target="_blank"
            rel="noopener noreferrer">
            <svg class="yt-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path
                d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
            </svg>
            YouTube
          </a>
        </li>
      </ul>
    </nav>

    <div class="header-controls">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>

      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false"
        aria-controls="site-nav">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </div>
</header>
