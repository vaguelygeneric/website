---
layout: default
---
<div class="post-wrapper">
  <div class="post-header">
    <a href="{{ '/blog/' | relative_url }}" class="back-link">← Blog</a>
    <div class="post-meta">
      <span class="post-date">{{ page.date | date: "%B %-d, %Y" }}</span>
      {% if page.tags %}<span class="post-tags">{% for tag in page.tags %}<span class="post-tag">{{ tag }}</span>{% endfor %}</span>{% endif %}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.description %}<p class="post-desc">{{ page.description }}</p>{% endif %}
  </div>
  <div class="post-body">
    {{ content }}
  </div>
</div>
